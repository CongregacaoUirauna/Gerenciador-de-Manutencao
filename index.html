<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Manutenção - Salão do Reino</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50 text-gray-800">

    <header class="bg-blue-600 text-white p-4 shadow-md">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold"><i class="fas fa-tools mr-2"></i> Manutenções</h1>
            <button id="btnNovaTarefa" class="bg-blue-800 hover:bg-blue-700 px-3 py-1 rounded text-sm font-semibold transition">
                + Nova
            </button>
        </div>
    </header>

    <main class="max-w-4xl mx-auto p-4 mt-4">
        
        <div class="flex gap-2 mb-6 overflow-x-auto pb-2">
            <button class="bg-blue-100 text-blue-800 px-4 py-1 rounded-full text-sm font-semibold whitespace-nowrap">Todas</button>
            <button class="bg-white border px-4 py-1 rounded-full text-sm text-gray-600 whitespace-nowrap">Pendentes</button>
            <button class="bg-white border px-4 py-1 rounded-full text-sm text-gray-600 whitespace-nowrap">Concluídas</button>
        </div>

        <div id="listaTarefas" class="space-y-4">
            <div class="bg-white p-4 rounded-lg shadow border-l-4 border-yellow-400">
                <div class="flex justify-between items-start mb-2">
                    <h2 class="font-bold text-lg">Inspeção Interna</h2>
                    <span class="bg-yellow-100 text-yellow-800 text-xs px-2 py-1 rounded font-bold">Pendente</span>
                </div>
                <p class="text-sm text-gray-600 mb-1"><i class="fas fa-users mr-1"></i> Ana Paula, Zildilene</p>
                <p class="text-sm text-gray-600 mb-3"><i class="far fa-calendar-alt mr-1"></i> Prazo: 23/08/2025</p>
                
                <div class="flex gap-2 mt-4 border-t pt-3">
                    <button class="flex-1 bg-green-500 text-white py-2 rounded text-sm font-bold hover:bg-green-600 transition">
                        <i class="fas fa-check mr-1"></i> Concluir
                    </button>
                    <button class="flex-1 border border-gray-300 text-gray-700 py-2 rounded text-sm font-bold hover:bg-gray-100 transition">
                        <i class="fab fa-whatsapp text-green-500 mr-1"></i> Avisar
                    </button>
                </div>
            </div>
            </div>
    </main>

    <div id="modalNovaTarefa" class="fixed inset-0 bg-black bg-opacity-50 hidden flex justify-center items-center p-4 z-50 transition-opacity">
        <div class="bg-white rounded-lg shadow-xl w-full max-w-md p-6">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold text-gray-800"><i class="fas fa-plus-circle text-blue-600 mr-2"></i>Nova Manutenção</h2>
                <button id="btnFecharModal" class="text-gray-500 hover:text-red-500 text-2xl leading-none">&times;</button>
            </div>
            
            <form id="formNovaTarefa" class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-700">O que precisa ser feito?</label>
                    <select id="selectTarefa" required class="w-full border border-gray-300 rounded-lg p-2 mt-1 focus:ring-2 focus:ring-blue-500 outline-none bg-white">
                        <option value="">Selecione uma tarefa...</option>
                        </select>
                    <p id="dicaParticipantes" class="text-xs text-blue-600 mt-1 font-semibold hidden"></p>
                </div>
                
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Equipe Designada</label>
                    <div id="containerVoluntarios" class="max-h-48 overflow-y-auto border border-gray-300 rounded-lg p-1 bg-gray-50 shadow-inner">
                        </div>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700">Observações (Opcional)</label>
                    <textarea id="inputObs" class="w-full border border-gray-300 rounded-lg p-2 mt-1 focus:ring-2 focus:ring-blue-500 outline-none" rows="2" placeholder="Ex: Levar escada, comprar rejunte..."></textarea>
                </div>
                
                <div class="bg-blue-50 p-3 rounded text-sm text-blue-800 flex items-center">
                    <i class="fas fa-info-circle mr-2"></i>
                    O sistema calculará automaticamente o prazo de 15 dias a partir de hoje.
                </div>

                <div class="flex justify-end gap-2 mt-6 pt-4 border-t">
                    <button type="button" id="btnCancelarModal" class="px-4 py-2 text-gray-600 font-semibold bg-gray-100 rounded-lg hover:bg-gray-200 transition">Cancelar</button>
                    <button type="submit" id="btnSalvarModal" class="px-4 py-2 bg-blue-600 font-semibold text-white rounded-lg hover:bg-blue-700 transition">Salvar Tarefa</button>
                </div>
            </form>
        </div>
    </div>
    
    <script type="module" src="./js/main.js"></script>
</body>
</html>
