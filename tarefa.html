<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Execução de Tarefa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 text-gray-800 font-sans pb-20">

    <header class="bg-blue-600 text-white p-4 shadow-md sticky top-0 z-10">
        <div class="max-w-xl mx-auto flex flex-col">
            <span class="text-blue-200 text-xs font-bold uppercase tracking-wider mb-1">Painel do Voluntário</span>
            <h1 id="tituloTarefa" class="text-xl font-bold leading-tight"><i class="fas fa-spinner fa-spin mr-2"></i>Carregando...</h1>
        </div>
    </header>

    <main id="conteudoPrincipal" class="max-w-xl mx-auto p-4 hidden space-y-6">
        
        <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-200">
            <div class="flex justify-between items-center mb-3">
                <span id="statusBadge" class="bg-yellow-100 text-yellow-800 text-xs px-3 py-1 rounded-full font-bold uppercase tracking-wide">Pendente</span>
                <span id="prazoTarefa" class="text-sm font-semibold text-gray-500"><i class="far fa-calendar-alt mr-1"></i> --/--/----</span>
            </div>
            <p class="text-sm text-gray-700 mb-2"><i class="fas fa-users w-5 text-center text-blue-500"></i> <strong id="equipeTarefa">...</strong></p>
        </div>

        <div id="containerPdf" class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden hidden flex flex-col">
            <div class="bg-gray-50 p-3 border-b flex items-center justify-between">
                <h3 class="font-bold text-gray-700 text-sm"><i class="fas fa-file-pdf text-red-500 mr-2"></i>Orientação da Tarefa</h3>
                <button id="btnExpandirPdf" class="text-blue-600 text-xs font-bold hover:underline">Ver em tela cheia</button>
            </div>
            <div class="w-full h-80 bg-gray-200 flex items-center justify-center">
                <iframe id="iframePdf" class="w-full h-full border-0" src=""></iframe>
            </div>
        </div>

        <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-200">
            <h3 class="font-bold text-gray-700 text-sm mb-2"><i class="fas fa-comment-dots text-blue-500 mr-2"></i>Observações e Relato</h3>
            <p class="text-xs text-gray-500 mb-3">Viu algum problema? Precisou comprar material? Algo deu errado? Deixe registrado abaixo.</p>
            <textarea id="inputObservacoes" class="w-full border border-gray-300 rounded-lg p-3 text-sm focus:ring-2 focus:ring-blue-500 outline-none" rows="3" placeholder="Digite aqui como foi a manutenção..."></textarea>
            <button id="btnSalvarObs" class="mt-2 text-sm font-bold text-blue-600 border border-blue-600 px-4 py-2 rounded-lg hover:bg-blue-50 transition w-full">
                <i class="fas fa-save mr-1"></i> Salvar Observação
            </button>
        </div>

    </main>

    <div id="barraAcoes" class="fixed bottom-0 left-0 right-0 bg-white border-t p-4 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] hidden z-20">
        <div class="max-w-xl mx-auto flex gap-3">
            <button id="btnPausar" class="flex-1 bg-orange-100 text-orange-700 py-3 rounded-xl font-bold hover:bg-orange-200 transition text-sm flex flex-col items-center justify-center gap-1">
                <i class="fas fa-pause-circle text-lg"></i>
                Pausar Tarefa
            </button>
            <button id="btnConcluir" class="flex-1 bg-green-500 text-white py-3 rounded-xl font-bold hover:bg-green-600 transition text-sm flex flex-col items-center justify-center gap-1 shadow-md">
                <i class="fas fa-check-circle text-lg"></i>
                Concluir Agora
            </button>
        </div>
    </div>

    <div id="telaAviso" class="max-w-xl mx-auto p-8 text-center hidden">
        <i id="iconeAviso" class="fas fa-exclamation-circle text-5xl text-gray-400 mb-4"></i>
        <h2 id="tituloAviso" class="text-xl font-bold text-gray-700 mb-2"></h2>
        <p id="textoAviso" class="text-gray-500"></p>
    </div>

    <script type="module" src="./js/tarefa.js"></script>
</body>
</html>
